    <circle cx="70" cy="2" r="2.5" fill="#FF8C4A" opacity="0.3"/>
    <circle cx="-52" cy="-38" r="2.5" fill="#FFB347" opacity="0.3"/>
    <circle cx="56" cy="-34" r="2" fill="#FFB347" opacity="0.28"/>
