<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07080A"/>
      <stop offset="100%" stop-color="#120804"/>
    </linearGradient>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@1,700&amp;family=Space+Grotesk:wght@400;500&amp;display=swap");
    </style>
  </defs>
  
  <!-- Background -->
