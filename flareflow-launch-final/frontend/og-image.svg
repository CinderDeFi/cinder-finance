  <text x="340" y="602" font-family="'Space Grotesk', Arial, sans-serif" font-size="14" font-weight="500" fill="#3A3632" letter-spacing="0.08em">cinder.finance  ·  @CinderDeFi  ·  Built on Flare Network</text>
  
  <!-- Live badge -->
  <rect x="1040" y="582" width="120" height="28" rx="14" fill="#0D1F10"/>
  <rect x="1040" y="582" width="120" height="28" rx="14" fill="none" stroke="#2A5530" stroke-width="1"/>
  <circle cx="1059" cy="596" r="4" fill="#4ABA6F"/>
  <text x="1070" y="601" font-family="'Space Grotesk', Arial, sans-serif" font-size="12" font-weight="500" fill="#4ABA6F" letter-spacing="0.06em">LIVE</text>
