    <path d="M0 52C-17 28-15 0 0-46C15 0 17 28 0 52Z" fill="#FF4500"/>
    <path d="M0 36C-10 16-9-2 0-28C9-2 10 16 0 36Z" fill="#FF6B23"/>
    <path d="M0 18C-5 6-4-2 0-12C4-2 5 6 0 18Z" fill="#FF8C4A"/>
    <circle cx="0" cy="-64" r="7" fill="#FF6B23" opacity="0.35"/>
    <circle cx="0" cy="-64" r="5" fill="#FFB347"/>
    <circle cx="0" cy="-64" r="2.5" fill="#FFF0C0"/>
    <!-- right flame -->
    <path d="M38 62C58 36 52 4 40-22C32-4 36 16 30 34C44 20 46 42 38 62Z" fill="#B83000"/>
    <path d="M36 52C50 28 46 4 35-12C29 1 31 18 26 34C37 20 39 38 36 52Z" fill="#FF4500"/>
    <path d="M33 40C42 20 38 0 28-8C25 3 26 17 22 30C30 18 33 28 33 40Z" fill="#FF6B23"/>
    <path d="M29 24C36 10 32-2 24-8C21 3 22 14 19 22C24 14 27 19 29 24Z" fill="#FF8C4A"/>
    <circle cx="33" cy="-24" r="6" fill="#FF6B23" opacity="0.4"/>
    <circle cx="33" cy="-24" r="4" fill="#FFB347"/>
    <circle cx="33" cy="-24" r="2" fill="#FFE8A0"/>
