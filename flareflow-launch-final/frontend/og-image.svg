  <!-- Stats row -->
  <text x="340" y="390" font-family="Georgia, serif" font-style="italic" font-weight="700" font-size="42" fill="#4ABA6F">9.1%</text>
  <text x="340" y="414" font-family="'Space Grotesk', Arial, sans-serif" font-size="13" font-weight="500" fill="#4A4642" letter-spacing="0.1em">SFLR APY</text>

  <text x="520" y="390" font-family="Georgia, serif" font-style="italic" font-weight="700" font-size="42" fill="#FF8C4A">8.4%</text>
  <text x="520" y="414" font-family="'Space Grotesk', Arial, sans-serif" font-size="13" font-weight="500" fill="#4A4642" letter-spacing="0.1em">STXRP APY</text>

  <text x="700" y="390" font-family="Georgia, serif" font-style="italic" font-weight="700" font-size="42" fill="#EEE9E1">0.1%</text>
  <text x="700" y="414" font-family="'Space Grotesk', Arial, sans-serif" font-size="13" font-weight="500" fill="#4A4642" letter-spacing="0.1em">EXIT FEE ONLY</text>

